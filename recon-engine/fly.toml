# fly.toml app configuration file generated for securevault-recon-engine on 2024-04-19T00:00:00Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = "securevault-recon-engine"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PYTHONUNBUFFERED = "1"

[[mounts]]
  source = "recon_data"
  destination = "/app/output"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  interval = "1m"
  timeout = "10s"
  grace_period = "5s"
  method = "GET"
  path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
